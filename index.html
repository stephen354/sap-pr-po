<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SAP Purchase Requisition & Purchase Order Creator — Dashboard for creating PR and PO via BAPI endpoints." />
  <title>SAP PR / PO Creator — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <div class="header__logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <div>
          <h1 class="header__title">SAP Document Creator</h1>
          <p class="header__subtitle">Purchase Requisition & Purchase Order</p>
        </div>
      </div>
      <div class="header__badge">
        <span class="status-dot"></span>
        Connected
      </div>
    </header>

    <!-- Mode Switcher -->
    <div class="mode-switcher">
      <button type="button" class="mode-btn active" data-mode="pr" id="modePR">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Purchase Requisition</span>
      </button>
      <button type="button" class="mode-btn" data-mode="po" id="modePO">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
          <line x1="1" y1="10" x2="23" y2="10"/>
        </svg>
        <span>Purchase Order</span>
      </button>
    </div>

    <!-- Main Card -->
    <main class="main-card">
      <div class="card-header">
        <div class="card-header__info">
          <h2 class="card-header__title" id="cardTitle">Create New PR</h2>
          <p class="card-header__desc" id="cardDesc">Add materials below and submit to create a Purchase Requisition in SAP.</p>
        </div>
        <div class="card-header__count" id="itemCount">
          <span class="card-header__count-num">1</span>
          <span class="card-header__count-label">Items</span>
        </div>
      </div>

      <form id="mainForm" autocomplete="off">
        <!-- SAP Credentials -->
        <div class="credentials">
          <div class="credentials__field">
            <label class="credentials__label" for="sapUser">SAP Username</label>
            <input id="sapUser" class="input" type="text" placeholder="Username" required />
          </div>
          <div class="credentials__field">
            <label class="credentials__label" for="sapPass">SAP Password</label>
            <input id="sapPass" class="input" type="password" placeholder="Password" required />
          </div>
        </div>

        <!-- PO Header Fields (hidden for PR mode) -->
        <div id="poHeaderSection" class="po-header-section" style="display:none;">
          <div class="section-label">PO Header</div>
          <div class="po-header-grid">
            <div class="po-header-field">
              <label class="credentials__label" for="compCode">Company Code</label>
              <input id="compCode" class="input" type="text" placeholder="e.g. 3000" value="3000" />
            </div>
            <div class="po-header-field">
              <label class="credentials__label" for="docType">Doc Type</label>
              <input id="docType" class="input" type="text" placeholder="e.g. NB" value="NB" />
            </div>
            <div class="po-header-field">
              <label class="credentials__label" for="vendor">Vendor</label>
              <input id="vendor" class="input" type="text" placeholder="e.g. 3005" />
            </div>
            <div class="po-header-field">
              <label class="credentials__label" for="purchOrg">Purch. Org</label>
              <input id="purchOrg" class="input" type="text" placeholder="e.g. 3000" value="3000" />
            </div>
            <div class="po-header-field">
              <label class="credentials__label" for="purGroup">Pur. Group</label>
              <input id="purGroup" class="input" type="text" placeholder="e.g. 001" value="001" />
            </div>
          </div>

          <!-- PO Sub-mode selector -->
          <div class="section-label" style="margin-top:18px;">PO Source</div>
          <div class="po-submode-switcher">
            <button type="button" class="submode-btn active" data-submode="from-pr" id="submodeFromPR">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
              </svg>
              From PR (Reference)
            </button>
            <button type="button" class="submode-btn" data-submode="direct" id="submodeDirect">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Direct PO
            </button>
          </div>

          <!-- PR Reference fields (only for "From PR" sub-mode) -->
          <div id="prRefSection" class="pr-ref-section">
            <div class="po-header-grid" style="margin-top:12px;">
              <div class="po-header-field" style="grid-column: span 2;">
                <label class="credentials__label" for="prNumber">PR Number</label>
                <input id="prNumber" class="input" type="text" placeholder="e.g. 0010013924" />
              </div>
            </div>
          </div>
        </div>

        <div class="section-label" id="itemsLabel">Items</div>

        <!-- Table header (desktop) — PR mode / Direct PO -->
        <div class="table-header" id="tableHeaderDirect">
          <span class="th th--idx">#</span>
          <span class="th th--material">Material</span>
          <span class="th th--qty">Quantity</span>
          <span class="th th--plant">Plant</span>
          <span class="th th--action"></span>
        </div>

        <!-- Table header (desktop) — PO from PR mode -->
        <div class="table-header table-header--pr-items" id="tableHeaderPR" style="display:none;">
          <span class="th th--idx">#</span>
          <span class="th" style="flex:1;">PR Item No</span>
          <span class="th th--action"></span>
        </div>

        <!-- Item rows container -->
        <div id="itemRows" class="item-rows"></div>

        <!-- Add Item Button -->
        <button type="button" id="addItemBtn" class="btn btn--add">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Item
        </button>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn btn--submit">
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span id="submitBtnText">Submit PR</span>
          <div class="spinner" id="submitSpinner"></div>
        </button>
      </form>

      <!-- Notification area -->
      <div id="notification" class="notification hidden"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 SAP PR / PO Creator</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
