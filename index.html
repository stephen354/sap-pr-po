<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SAP Purchase Requisition Creator — Dashboard for creating PR via BAPI endpoint." />
  <title>Create Purchase Requisition — SAP Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="header">
      <div class="header__logo">
        <div class="header__logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <div>
          <h1 class="header__title">SAP PR Creator</h1>
          <p class="header__subtitle">Purchase Requisition Dashboard</p>
        </div>
      </div>
      <div class="header__badge">
        <span class="status-dot"></span>
        Connected
      </div>
    </header>

    <!-- Main Card -->
    <main class="main-card">
      <div class="card-header">
        <div class="card-header__info">
          <h2 class="card-header__title">Create New PR</h2>
          <p class="card-header__desc">Add materials below and submit to create a Purchase Requisition in SAP.</p>
        </div>
        <div class="card-header__count" id="itemCount">
          <span class="card-header__count-num">1</span>
          <span class="card-header__count-label">Items</span>
        </div>
      </div>

      <form id="prForm" autocomplete="off">
        <!-- SAP Credentials -->
        <div class="credentials">
          <div class="credentials__field">
            <label class="credentials__label" for="sapUser">SAP Username</label>
            <input id="sapUser" class="input" type="text" placeholder="Username" required />
          </div>
          <div class="credentials__field">
            <label class="credentials__label" for="sapPass">SAP Password</label>
            <input id="sapPass" class="input" type="password" placeholder="Password" required />
          </div>
        </div>

        <div class="section-label">Items</div>

        <!-- Table header (desktop) -->
        <div class="table-header">
          <span class="th th--idx">#</span>
          <span class="th th--material">Material</span>
          <span class="th th--qty">Quantity</span>
          <span class="th th--plant">Plant</span>
          <span class="th th--action"></span>
        </div>

        <!-- Item rows container -->
        <div id="itemRows" class="item-rows"></div>

        <!-- Add Item Button -->
        <button type="button" id="addItemBtn" class="btn btn--add">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Add Item
        </button>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn btn--submit">
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          <span id="submitBtnText">Submit PR</span>
          <div class="spinner" id="submitSpinner"></div>
        </button>
      </form>

      <!-- Notification area -->
      <div id="notification" class="notification hidden"></div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 SAP PR Creator</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
